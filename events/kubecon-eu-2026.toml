[conference]
name = "KubeCon EU 2026"
schedule_url = "https://kccnceu2026.sched.com"
# sched_api_key read from SCHED_API_KEY env var

[conference.recordings]
source_url = "https://www.youtube.com/playlist?list=PLj6h78yzYM2MXCOWSN9CqqID6OOvF7wxL"

[extract]
whisper_model = "large-v3-turbo"
device = "auto"
compute_type = "auto"
scene_threshold = 27.0
vlm_model = "gemma3:12b"

[llm]
model = "qwen3:14b"

[query]
embedding_model = "nomic-embed-text"
ollama_base_url = "http://localhost:11434"
top_k = 15
